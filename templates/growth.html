<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plant Growth Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
font-family:'Inter',sans-serif;
background:#eef6e8;
color:#1f3a2b;
}

/* Sidebar */

.sidebar{
background:linear-gradient(145deg,#204d2a,#2a5e36);
min-height:100vh;
color:white;
padding:25px;
}

.sidebar h4{
margin-bottom:25px;
}

.sidebar a{
display:block;
padding:12px 15px;
margin:6px 0;
color:#daf5cf;
text-decoration:none;
border-radius:10px;
}

.sidebar a:hover{
background:#3c7247;
}

/* Main */

.main-panel{
padding:30px;
}

/* Cards */

.card-box{
background:white;
border-radius:18px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* Upload box */

.upload-box{
border:2px dashed #4caf50;
border-radius:15px;
padding:40px;
width:420px;
margin:auto;
background:#f8fff6;
cursor:pointer;
text-align:center;
}

/* Image display */

.image-box{
height:400px;
display:flex;
align-items:center;
justify-content:center;
background:#fafafa;
border-radius:10px;
overflow:hidden;
}

.image-box img{
max-height:100%;
max-width:100%;
object-fit:contain;
}

/* Loading overlay */

#loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader-container{
text-align:center;
color:white;
}

.bars{
display:flex;
gap:6px;
justify-content:center;
margin-bottom:10px;
}

.bars div{
width:8px;
height:35px;
background:#8cff8c;
animation:barsMove 1s infinite;
}

.bars div:nth-child(2){animation-delay:0.1s}
.bars div:nth-child(3){animation-delay:0.2s}
.bars div:nth-child(4){animation-delay:0.3s}
.bars div:nth-child(5){animation-delay:0.4s}

@keyframes barsMove{
0%{transform:scaleY(0.4);}
50%{transform:scaleY(1);}
100%{transform:scaleY(0.4);}
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 sidebar">

<h4><i class="fas fa-seedling"></i> Greenhouse</h4>

<hr>

<a href="/"><i class="fas fa-gauge"></i> Dashboard</a>
<a href="/sensors"><i class="fas fa-microchip"></i> Sensors</a>
<a href="/growth"><i class="fas fa-chart-line"></i> Growth Analyzer</a>
<a href="/disease"><i class="fas fa-leaf"></i> Disease Detection</a>
<a href="/deficiency"><i class="fas fa-flask"></i> Nutrient Deficiency</a>
<a href="/irrigation"><i class="fas fa-water"></i> Irrigation</a>

</div>


<!-- Main -->

<div class="col-md-10 main-panel">

<h2>Plant Growth Analyzer</h2>

<div class="card-box mt-4 text-center">

<div id="dropArea" class="upload-box">

<p><i class="fas fa-cloud-upload-alt fa-2x"></i></p>

<p><b>Drag & Drop Image</b></p>
<p>or</p>

<input type="file" id="image" hidden>

<button class="btn btn-success" onclick="document.getElementById('image').click()">
Choose File
</button>

</div>

<button class="btn btn-primary mt-3" onclick="upload()">
Analyze
</button>

</div>


<!-- Uploaded Image -->

<div class="card-box mt-4 text-center">

<h6>Uploaded Image</h6>

<div class="image-box">
<img id="preview">
</div>

</div>


<!-- Tabs (hidden initially) -->

<div id="resultTabs" style="display:none">

<ul class="nav nav-tabs mt-4" id="growthTabs"></ul>

<div class="tab-content mt-3" id="growthTabContent"></div>

</div>


<div class="card-box text-center mt-4">

<h4 id="result"></h4>
<p id="mode"></p>

</div>

</div>
</div>
</div>


<!-- Loading Overlay -->

<div id="loadingOverlay">

<div class="loader-container">

<div class="bars">
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
</div>

<p>Analyzing growth...</p>

</div>

</div>


<script>

let dropArea=document.getElementById("dropArea")
let fileInput=document.getElementById("image")

dropArea.addEventListener("dragover",(e)=>{
e.preventDefault()
})

dropArea.addEventListener("drop",(e)=>{

e.preventDefault()

fileInput.files=e.dataTransfer.files

preview()

})

fileInput.addEventListener("change",preview)


function preview(){

let file=fileInput.files[0]

if(!file) return

document.getElementById("preview").src=URL.createObjectURL(file)

}


function upload(){

let file=fileInput.files[0]

if(!file) return

document.getElementById("loadingOverlay").style.display="flex"

let form=new FormData()
form.append("image",file)

fetch("/api/growth",{
method:"POST",
body:form
})

.then(r=>r.json())

.then(data=>{

document.getElementById("loadingOverlay").style.display="none"

document.getElementById("result").innerHTML=
"Growth Score: "+data.growth.toFixed(2)+"%"

document.getElementById("mode").innerHTML=
"<b>Stage:</b> "+data.mode

document.getElementById("resultTabs").style.display="block"

let tabs=document.getElementById("growthTabs")
let content=document.getElementById("growthTabContent")

tabs.innerHTML=""
content.innerHTML=""

function createTab(name,id,img){

tabs.innerHTML+=`
<li class="nav-item">
<a class="nav-link ${tabs.children.length===0?'active':''}" data-bs-toggle="tab" href="#${id}">
${name}
</a>
</li>
`

content.innerHTML+=`
<div class="tab-pane fade ${content.children.length===0?'show active':''}" id="${id}">
<div class="image-box">
<img src="${img}?t=${Date.now()}">
</div>
</div>
`
}

if(data.mode==="vegetative"){

createTab("Leaf Mask","mask",data.mask_image)
createTab("Skeleton","skeleton",data.skeleton_image)

}

createTab("Result","resultimg",data.result_image)

})

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
